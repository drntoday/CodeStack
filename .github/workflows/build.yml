name: CodeStack Builder

# This tells the robot when to work (whenever you save code to 'main')
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. The robot copies your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. The robot sets up Java (The language Android uses)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. This is the "Magic Step" - It installs Gradle for you 
      # so you don't need the 'gradlew' file in your repo!
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # 4. The robot starts "baking" your APK
      - name: Build Debug APK
        run: gradle assembleDebug

      # 5. The robot gives you the download link
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeStack-Debug-App
          path: app/build/outputs/apk/debug/app-debug.apk
