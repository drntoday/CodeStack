name: Gemini AI Executor

on:
  repository_dispatch:
    types: [gemini_task]

jobs:
  execute-ai-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @google/generative-ai

      - name: Run Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TASK_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/agent-processor.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "AI: ${{ github.event.client_payload.task_description }}"
          title: "AI Suggestion: ${{ github.event.client_payload.task_description }}"
          body: "This PR was generated by CodeStack using Gemini 1.5 Pro."
          branch: ai-task-${{ github.run_id }}
