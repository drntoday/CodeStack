name: Gemini AI Executor

on:
  repository_dispatch:
    types: [gemini_task]

jobs:
  execute-ai-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODESTACK_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # We install the generative-ai package so the script can talk to Gemini
        run: npm install @google/generative-ai

      - name: Run Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # This passes the data from your Vercel UI into the script
          TASK_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/agent-processor.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          # Using the custom PAT allows the PR to trigger other actions (like tests)
          token: ${{ secrets.CODESTACK_PAT }}
          commit-message: "AI: ${{ github.event.client_payload.task_description }}"
          title: "AI Suggestion: ${{ github.event.client_payload.task_description }}"
          body: |
            ## 🤖 CodeStack AI Report
            **Task:** ${{ github.event.client_payload.task_description }}
            **Files modified:** ${{ github.event.client_payload.target_files }}
            
            This PR was generated automatically by the CodeStack DIY Codex.
          branch: ai-task-${{ github.run_id }}
          delete-branch: true
